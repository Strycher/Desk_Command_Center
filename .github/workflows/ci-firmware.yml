# CI: Firmware Build (PlatformIO)
# Triggers on PRs that modify firmware source files.
# Runs PlatformIO compile to catch build breaks early.

name: CI — Firmware Build

on:
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/workflows/ci-firmware.yml'
  push:
    branches: [main]
    paths:
      - 'firmware/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        working-directory: firmware
        run: pio run --environment crowpanel5

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: firmware/.pio/build/crowpanel5/firmware.bin
          retention-days: 30
