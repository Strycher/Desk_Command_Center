# Auto-promote dependencies: when an issue closes, check if blocked
# issues now have all dependencies resolved and label them beads:ready.
#
# Trigger: issue closed + weekly cron sweep
# API: REST only (no GraphQL / gh project)
name: Auto-promote Dependencies

on:
  issues:
    types: [closed]
  schedule:
    - cron: "0 7 * * 1"  # Monday 7am UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  promote:
    runs-on: ubuntu-latest
    if: github.repository == 'Strycher/Desk_Command_Center'
    steps:
      - name: Find and promote unblocked issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Fetch all open issues
            const openIssues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: 'open', per_page: 100 }
            );

            // Fetch all closed issues (for dependency checking)
            const closedIssues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: 'closed', per_page: 100 }
            );

            const closedNumbers = new Set(
              closedIssues.map(i => i.number)
            );

            // Parse depends-on from issue body
            function getDeps(body) {
              if (!body) return [];
              const match = body.match(
                /<!--\s*depends-on:\s*(.*?)\s*-->/i
              );
              if (!match) return [];
              return match[1]
                .split(',')
                .map(s => s.trim())
                .filter(s => s.startsWith('#'))
                .map(s => parseInt(s.slice(1), 10))
                .filter(n => !isNaN(n));
            }

            let promoted = 0;

            for (const issue of openIssues) {
              // Skip PRs
              if (issue.pull_request) continue;

              const deps = getDeps(issue.body);
              if (deps.length === 0) continue;

              const allResolved = deps.every(d => closedNumbers.has(d));
              const labels = issue.labels.map(l => l.name);
              const hasReady = labels.includes('beads:ready');
              const hasBlocked = labels.includes('beads:blocked');

              if (allResolved && !hasReady) {
                // Add beads:ready label
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: issue.number,
                  labels: ['beads:ready'],
                });

                // Remove beads:blocked if present
                if (hasBlocked) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner, repo,
                      issue_number: issue.number,
                      name: 'beads:blocked',
                    });
                  } catch (e) {
                    // Label might not exist
                  }
                }

                // Add comment
                const depList = deps.map(d => `#${d}`).join(', ');
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: issue.number,
                  body: `All dependencies resolved (${depList}). This issue is now ready for work.`,
                });

                console.log(`Promoted #${issue.number}: ${issue.title}`);
                promoted++;
              } else if (!allResolved && !hasBlocked) {
                const pending = deps.filter(d => !closedNumbers.has(d));
                // Optionally add beads:blocked label
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: issue.number,
                  labels: ['beads:blocked'],
                });
                console.log(
                  `Blocked #${issue.number}: waiting on ${pending.map(d => '#' + d).join(', ')}`
                );
              }
            }

            console.log(`\nPromoted ${promoted} issue(s)`);
