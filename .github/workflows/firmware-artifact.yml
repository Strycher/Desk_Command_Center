# Build Firmware Artifact: On push to main, build and upload .bin
# Creates a release artifact for firmware deployment.

name: Build Firmware Artifact

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'platformio.ini'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run --environment crowpanel

      - name: Get version tag
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          SHA=$(git rev-parse --short HEAD)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Building firmware $TAG ($SHA)"

      - name: Rename artifact
        run: |
          mkdir -p release
          cp .pio/build/crowpanel/firmware.bin "release/dcc-firmware-${{ steps.version.outputs.tag }}-${{ steps.version.outputs.sha }}.bin"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: dcc-firmware-${{ steps.version.outputs.tag }}
          path: release/*.bin
          retention-days: 90

      - name: Create GitHub Release (on new tag)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            release/*.bin \
            --title "Firmware ${{ steps.version.outputs.tag }}" \
            --generate-notes
