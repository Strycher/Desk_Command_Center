# CI: Bridge Build + Test (Python)
# Triggers on PRs that modify bridge service files.
# Runs ruff lint, mypy type checking, and pytest.

name: CI — Bridge Build + Test

on:
  pull_request:
    paths:
      - 'bridge/**'
      - 'pyproject.toml'
      - '.github/workflows/ci-bridge.yml'
  push:
    branches: [main]
    paths:
      - 'bridge/**'
      - 'pyproject.toml'

jobs:
  lint:
    runs-on: ubuntu-latest
    if: github.repository == 'Strycher/Desk_Command_Center'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install ruff mypy types-PyMySQL
          pip install -r bridge/requirements.txt

      - name: Lint with ruff
        run: ruff check bridge/ --exclude bridge/tests/

      - name: Type check with mypy
        run: mypy bridge/main.py --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    if: github.repository == 'Strycher/Desk_Command_Center'
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx
          pip install -r bridge/requirements.txt

      - name: Run tests
        run: PYTHONPATH=bridge pytest bridge/tests/ -v --tb=short
