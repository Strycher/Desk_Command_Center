# Auto-merge: Squash-merge approved PRs after CI passes
# Triggers only on PR approval — no more check_suite noise.

name: Auto-Merge Approved PRs

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.repository == 'Strycher/Desk_Command_Center' &&
      github.event.review.state == 'approved'
    steps:
      - name: Squash-merge approved PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "Checking PR #$PR_NUMBER..."

          # Verify all checks pass
          CHECKS=$(gh pr checks "$PR_NUMBER" --repo ${{ github.repository }} 2>/dev/null)
          if echo "$CHECKS" | grep -qE "fail|pending"; then
            echo "PR #$PR_NUMBER has failing or pending checks"
            exit 0
          fi

          echo "Squash-merging PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --repo ${{ github.repository }} --squash --auto
